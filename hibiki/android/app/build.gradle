plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "app.hibiki.reader"
    compileSdk 36
    ndkVersion '27.0.12077973'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "app.hibiki.reader"
        minSdkVersion 24
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++23"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
        ndk {
            // abiFilters omitted: --split-per-abi in CI controls ABI splits;
            // fat APK includes all ABIs by default
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystorePropertiesFile.exists() ? file("${rootProject.projectDir}/${keystoreProperties['storeFile']}") : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
        debug {
        }
    }

    packagingOptions {
        pickFirst 'lib/**/libc++_shared.so'
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def appName = "hibiki"
            def buildType = variant.buildType.name
            def architecture = output.getFilter(com.android.build.OutputFile.ABI)
            def newName

            if ("${architecture}" == "arm64-v8a") {
                architecture = "arm64"
            } else if ("${architecture}" == "armeabi-v7a") {
                architecture = "armeabi"
            }

            if ("${architecture}" == "null") {
                if (buildType == 'debug') {
                    newName = "${appName}_${defaultConfig.versionName}-debug.apk"
                } else {
                    newName = "${appName}_${defaultConfig.versionName}.apk"
                }
                output.versionCodeOverride = (100 * project.android.defaultConfig.versionCode)
            } else {
                if (buildType == 'debug') {
                    newName = "${appName}_${defaultConfig.versionName}-${architecture}-debug.apk"
                } else {
                    newName = "${appName}_${defaultConfig.versionName}-${architecture}.apk"
                }

                def offset
                if (architecture == "armeabi") {
                    offset = 1
                } else if (architecture == "arm64") {
                    offset = 2
                } else if (architecture == "x86_64") {
                    offset = 3
                }

                outputFileName = newName
                output.versionCodeOverride = (100 * project.android.defaultConfig.versionCode) + offset
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.23"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.github.ankidroid:Anki-Android:2.17alpha14'
    implementation 'com.github.umair13adil:RxLogs:v1.0.18'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'androidx.media3:media3-transformer:1.10.0'
}
